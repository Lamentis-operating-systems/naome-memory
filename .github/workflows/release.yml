name: Release

on:
  push:
    tags:
      - "v0.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  verify-tag:
    name: Verify signed annotated tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      checks: read
      contents: read
    steps:
      - name: Check out exact tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Require annotated SSH-signed tag from an allowed signer
        run: |
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
          test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" = "$GITHUB_SHA"
          git config --local gpg.format ssh
          git config --local gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/governance/github/allowed_signers"
          git verify-tag "$GITHUB_REF_NAME"
      - name: Require tagged commit on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Require successful main-commit CI and CodeQL checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p target/release-gate
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100" \
            > target/release-gate/check-runs.json
          python3 scripts/verify_release_checks.py \
            --input target/release-gate/check-runs.json \
            --required "CI / required" \
            --required "CodeQL / Analyze (actions)" \
            --required "CodeQL / Analyze (rust)"

  release-proof:
    name: Repeat deep proof on exact tag commit
    needs: [verify-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Check out exact tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component llvm-tools-preview
      - name: Run core unit and golden tests
        run: cargo +1.95.0 test --release --locked --all-features -p naome-memory-core
      - name: Run 20000-case property campaign
        env:
          NAOME_MEMORY_PROPERTY_CASES: "20000"
        run: cargo +1.95.0 test --release --locked --all-features -p naome-memory-lab --test campaigns deterministic_property_campaign -- --exact --nocapture
      - name: Run 10000-world independent differential campaign
        env:
          NAOME_MEMORY_DIFFERENTIAL_WORLDS: "10000"
        run: cargo +1.95.0 test --release --locked --all-features -p naome-memory-lab --test campaigns slow_independent_differential_campaign -- --exact --nocapture
      - name: Run real child-process crash campaign
        run: cargo +1.95.0 test --release --locked --all-features -p naome-memory-sqlite --test crash_atomicity -- --nocapture
      - name: Run SQLite integrity, scope, and tamper campaign
        run: cargo +1.95.0 test --release --locked --all-features -p naome-memory-sqlite --test integrity_and_scope -- --nocapture
      - name: Produce deep theory receipt
        run: cargo +1.95.0 run --release --locked -p xtask -- proof --profile deep --output target/proofs/release-receipt.json
      - name: Verify and replay release receipt
        run: cargo +1.95.0 run --release --locked -p xtask -- replay --receipt target/proofs/release-receipt.json --repetitions 2
      - name: Upload deep proof evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-proof-${{ github.sha }}
          path: target/proofs/
          if-no-files-found: error
          retention-days: 90
      - name: Require supported frozen-holdout claims
        run: cargo +1.95.0 run --release --locked -p xtask -- assert-claims --receipt target/proofs/release-receipt.json

  release-scale:
    name: Reprove 100000-atom envelope on exact tag commit
    needs: [verify-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out exact tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Persist and verify scale envelope
        run: cargo +1.95.0 run --release --locked -p xtask -- scale --atoms 100000
      - name: Upload scale evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-scale-${{ github.sha }}
          path: target/proofs/
          if-no-files-found: error
          retention-days: 90

  release-mutation:
    name: Reprove decision-core mutation gate on exact tag commit
    needs: [verify-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Check out exact tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Install pinned mutation tool
        run: cargo +1.95.0 install --locked cargo-mutants --version 27.1.0
      - name: Run mutation gate
        run: cargo +1.95.0 run --release --locked -p xtask -- mutation
      - name: Upload mutation evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-mutation-${{ github.sha }}
          path: target/proofs/
          if-no-files-found: error
          retention-days: 90

  release-fuzz:
    name: Reprove bounded fuzz gate on exact tag commit
    needs: [verify-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out exact tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install stable and pinned nightly Rust toolchains
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup toolchain install nightly-2026-07-01 --profile minimal
      - name: Install pinned fuzz tool
        run: cargo +1.95.0 install --locked cargo-fuzz --version 0.13.2
      - name: Run four two-minute fuzz targets
        run: cargo +1.95.0 run --release --locked -p xtask -- fuzz --seconds 120
      - name: Upload fuzz evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-fuzz-${{ github.sha }}
          path: target/proofs/
          if-no-files-found: error
          retention-days: 90

  verify-proof:
    name: Verify complete release evidence closure
    needs: [release-proof, release-scale, release-mutation, release-fuzz]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Download exact-tag release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-evidence-*-${{ github.sha }}
          path: target/proofs
          merge-multiple: true
      - name: Require full closure and supported claims
        run: |
          test -s target/proofs/release-receipt.json
          test -s target/proofs/decision-ledger.json
          test -s target/proofs/crash-campaign-evidence.json
          test -s target/proofs/dataset-manifest-v1.json
          test -s target/proofs/scale-receipt.json
          test -s target/proofs/scale-core-retirement-receipt.json
          test -s target/proofs/mutation-receipt.json
          test -s target/proofs/fuzz-receipt.json
          cargo +1.95.0 run --release --locked -p xtask -- release-preflight --version "${GITHUB_REF_NAME#v}"
      - name: Install pinned Draft 2020-12 validator
        run: python3 -m pip install --disable-pip-version-check --no-input --requirement .github/schema-requirements.txt
      - name: Validate release receipts, ledger, manifest, and committed schemas
        run: >-
          python3 scripts/validate_json_schemas.py
          --bind schemas/lab-proof-receipt-v1.schema.json=target/proofs/release-receipt.json
          --bind schemas/decision-ledger-v1.schema.json=target/proofs/decision-ledger.json
          --bind schemas/scale-receipt-v1.schema.json=target/proofs/scale-receipt.json
          --bind schemas/proof-receipt-v1.schema.json=target/proofs/scale-core-retirement-receipt.json
          --bind schemas/tool-receipt-v1.schema.json=target/proofs/mutation-receipt.json
          --bind schemas/tool-receipt-v1.schema.json=target/proofs/fuzz-receipt.json
      - name: Upload complete release proof closure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-proof-${{ github.sha }}
          path: target/proofs/
          if-no-files-found: error
          retention-days: 90

  build:
    name: Build ${{ matrix.target }}
    needs: [verify-proof]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            architecture: x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            architecture: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Check out exact tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Require declared runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"
      - name: Install pinned Rust toolchain and target
        run: rustup toolchain install 1.95.0 --profile minimal --target "${{ matrix.target }}"
      - name: Build CLI binary
        run: cargo +1.95.0 build --release --locked --target "${{ matrix.target }}" -p naome-memory-cli
      - name: Create deterministic release archive
        run: >-
          python3 scripts/create_release_archive.py
          --binary "target/${{ matrix.target }}/release/naome-memory"
          --output "target/naome-memory-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
      - name: Upload binary archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/naome-memory-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Attest and publish GitHub Release
    needs: [verify-proof, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out exact tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download binary archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: release-assets
          merge-multiple: true
      - name: Download proof closure
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-proof-${{ github.sha }}
          path: target/release-proof
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Generate CycloneDX SBOMs
        run: |
          cargo +1.95.0 install --locked cargo-cyclonedx --version 0.5.9
          cargo +1.95.0 cyclonedx --format json
          python3 scripts/create_sbom_bundle.py --root . --output release-assets/naome-memory-${GITHUB_REF_NAME}-cyclonedx-sbom.tar.gz
      - name: Assemble proof and contract assets
        run: |
          cp docs/specs/theory-contract-v1.md release-assets/theory-contract-v1.md
          cp policies/poc-v1.toml release-assets/poc-v1.toml
          cp target/release-proof/release-receipt.json release-assets/release-receipt.json
          cp target/release-proof/scale-core-retirement-receipt.json release-assets/scale-core-retirement-receipt.json
          cp target/release-proof/decision-ledger.json release-assets/decision-ledger.json
          cp target/release-proof/crash-campaign-evidence.json release-assets/crash-campaign-evidence.json
          cp target/release-proof/dataset-manifest-v1.json release-assets/dataset-manifest-v1.json
          cp target/release-proof/scale-receipt.json release-assets/scale-receipt.json
          cp target/release-proof/mutation-receipt.json release-assets/mutation-receipt.json
          cp target/release-proof/fuzz-receipt.json release-assets/fuzz-receipt.json
          cp target/release-proof/tool-logs/* release-assets/
          (cd release-assets && find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' | sort -z | xargs -0 sha256sum) > /tmp/naome-memory-checksums
          mv /tmp/naome-memory-checksums release-assets/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
