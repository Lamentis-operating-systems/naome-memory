name: CodeQL

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: "17 01 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # These literal matrix-expanded names are required-check contexts.
    name: CodeQL / Analyze (${{ matrix.language }})
    strategy:
      fail-fast: false
      matrix:
        language: [actions, rust]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        if: matrix.language == 'rust'
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild Rust
        if: matrix.language == 'rust'
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:${{ matrix.language }}
