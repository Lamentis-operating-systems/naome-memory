name: Dependency Review

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  dependency-review:
    # This literal job name is the required-check context in the ruleset.
    name: Dependency Review / Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Review pull-request dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true
      - name: Review merge-group dependency changes
        if: github.event_name == 'merge_group'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ github.event.merge_group.base_sha }}
          head-ref: ${{ github.event.merge_group.head_sha }}
          fail-on-severity: moderate
          license-check: true
